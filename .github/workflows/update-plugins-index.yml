name: Update plugins.json index

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate plugins.json
        run: python3 .github/scripts/generate_index.py

      - name: Commit plugins.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins.json
          # Only commit when something actually changed
          if git diff --cached --quiet; then
            echo "plugins.json is up to date – nothing to commit."
          else
            git commit -m "chore: update plugins.json index [skip ci]"
            git push
          fi
